<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Aurora Field</title>
<style>
  :root {
    --ui: 'Space Grotesk', ui-sans-serif, system-ui, sans-serif;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    height: 100%;
    overflow: hidden;
    background: #050407;
    color: #fff;
    font-family: var(--ui);
    cursor: crosshair;
    -webkit-user-select: none;
    user-select: none;
  }
  #root { position: fixed; inset: 0; }

  canvas.gl {
    position: fixed;
    inset: 0;
    width: 100vw;
    height: 100vh;
    display: block;
    z-index: 0;
  }

  .ui-chrome {
    position: fixed;
    inset: 0;
    z-index: 5;
    pointer-events: none;
  }

  /* ---- bottom dock ---- */
  .dock {
    position: absolute;
    left: 50%;
    bottom: 34px;
    transform: translateX(-50%);
    display: flex;
    align-items: stretch;
    gap: 2px;
    padding: 7px;
    border-radius: 999px;
    pointer-events: auto;
    background: rgba(14, 12, 20, 0.42);
    border: 1px solid rgba(255, 255, 255, 0.09);
    box-shadow:
      0 18px 50px -20px rgba(0, 0, 0, 0.8),
      inset 0 1px 0 rgba(255, 255, 255, 0.07);
    backdrop-filter: blur(22px) saturate(1.1);
    -webkit-backdrop-filter: blur(22px) saturate(1.1);
  }
  .tab {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 1px;
    min-width: 92px;
    padding: 12px 20px;
    border: 0;
    border-radius: 999px;
    background: transparent;
    color: rgba(225, 222, 235, 0.46);
    font-family: var(--ui);
    font-size: 12.5px;
    font-weight: 600;
    letter-spacing: 0.16em;
    line-height: 1.18;
    cursor: pointer;
    transition: color 0.25s ease, background 0.25s ease;
  }
  .tab span { display: block; }
  .tab:hover { color: rgba(235, 233, 245, 0.72); }
  .tab.on {
    color: #fff;
    background: rgba(255, 255, 255, 0.05);
    box-shadow:
      inset 0 0 0 1px rgba(255, 255, 255, 0.14),
      inset 0 1px 0 rgba(255, 255, 255, 0.18),
      0 6px 18px -8px rgba(255, 80, 30, 0.55);
  }

  /* corner watermark for OS flavor */
  .stamp {
    position: absolute;
    top: 26px;
    left: 30px;
    z-index: 5;
    font-size: 11px;
    letter-spacing: 0.34em;
    font-weight: 600;
    color: rgba(255, 255, 255, 0.32);
    pointer-events: none;
  }
  .hint {
    position: absolute;
    top: 26px;
    right: 30px;
    z-index: 5;
    font-size: 10.5px;
    letter-spacing: 0.22em;
    font-weight: 500;
    color: rgba(255, 255, 255, 0.26);
    text-align: right;
    pointer-events: none;
  }
</style>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet" />
</head>
<body>
  <div class="stamp">AURORA OS</div>
  <div class="hint">MOVE TO LIGHT · CLICK TO IGNITE</div>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script src="shader.js"></script>
  <script type="text/babel" src="tweaks-panel.jsx"></script>
  <script type="text/babel" src="wallpaper.jsx"></script>
</body>
</html>
