name: Weekly refresh (data + accuracy bar)

# Every Monday: fetch the weekend's results/qualifying from Jolpica, then commit
#   • ml/data/raw/*            — the refreshed race + qualifying data
#   • ml/models/live_metrics.json — the recomputed accuracy bar
# so the deployed app is current without anyone clicking RUN.
#
# The next-race snapshot and real-grid (Mode 2) predictions are still handled at
# runtime by the app's RUN button — not on a schedule.

on:
  schedule:
    - cron: "0 6 * * 1"   # Monday 06:00 UTC
  workflow_dispatch:        # manual run from the Actions tab

permissions:
  contents: write

concurrency:
  group: weekly-refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Install OpenMP runtime (LightGBM needs libgomp)
        run: sudo apt-get update && sudo apt-get install -y libgomp1

      - name: Install Python deps
        run: pip install -r ml/requirements.txt

      - name: Fetch latest data + roll snapshot + recompute accuracy bar
        run: python ml/scripts/refresh_for_next_race.py --backtest

      - name: Commit & push if anything changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add ml/data/raw web/public/data/next_race_prediction.json ml/models/live_metrics.json
          if git diff --cached --quiet; then
            echo "Nothing changed."
          else
            git commit -m "chore: weekly data + accuracy bar refresh [skip ci]"
            git push
          fi
